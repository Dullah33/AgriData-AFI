<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Diarahkan ke stdout/stderr supaya muncul di Railway Deploy Logs
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>